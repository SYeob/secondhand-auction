[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --html=reports/test-report.html
    --self-contained-html
    --css=tests/report_style.css
markers =
    smoke: 서비스 기본 동작 확인
    ui: Selenium UI 테스트
    api: API 테스트
    p0: 핵심 경매 기능
    p1: 주요 사용자 기능
    p2: 부가 사용자 기능
    regression: 회귀 테스트
